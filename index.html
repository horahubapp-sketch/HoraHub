<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encaixe</title>
    
    <!-- Configurações PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1E1E24" />
    
    <!-- Meta-tags exclusivas para suporte a iOS (Safari PWA) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Encaixe" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Script de registro do Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[Encaixe PWA] Service Worker registrado com sucesso:', reg.scope))
            .catch(err => console.error('[Encaixe PWA] Erro ao registrar Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
